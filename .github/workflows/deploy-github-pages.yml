name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'frontend/driving_planer/**'
      - '.github/workflows/deploy-github-pages.yml'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/driving_planer/package-lock.json'

      - name: Install dependencies
        run: cd frontend/driving_planer && npm ci

      - name: Build frontend
        run: cd frontend/driving_planer && npm run build
        env:
          VITE_API_URL: ${{ secrets.RAILWAY_API_URL }}/api

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: 'frontend/driving_planer/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
