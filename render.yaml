services:
  # Backend Service - Node.js/Express API
  - type: web
    name: driving-planer-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: /tmp/driving_planer.db
      - key: CORS_ORIGIN
        value: https://driving-planer-frontend.onrender.com
      # Add this in Render dashboard after deployment:
      # - key: JWT_SECRET
      #   sync: false
    healthCheckPath: /health

  # Frontend Service - Vue 3 + Vite Static Site
  - type: web
    name: driving-planer-frontend
    runtime: static
    plan: starter
    buildCommand: cd frontend/driving_planer && npm install && npm run build
    staticPublishPath: frontend/driving_planer/dist
    routes:
      - type: rewrite
        source: /app/*
        destination: /index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://driving-planer-backend.onrender.com/api

  # Optional: Job for database initialization
  # Uncomment if you need to run migrations on deployment
  # - type: cron
  #   name: db-seed
  #   schedule: "0 0 1 * *"  # Run once a month
  #   buildCommand: cd backend && npm install
  #   startCommand: cd backend && npm run seed
  #   envVars:
  #     - key: NODE_ENV
  #       value: production
  #     - key: DATABASE_URL
  #       value: /var/data/driving_planer.db
